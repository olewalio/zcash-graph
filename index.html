// vis-network setup
let net = null;
const C = {person:'#4a9eff',org:'#f7931a',project:'#7c3aed',investor:'#10b981',integration:'#ec4899',event:'#f59e0b'};
const nmap = {}; NODES.forEach(n=>{nmap[n.id]=n.l.replace(/\n/g,' ')});

// Build reverse relation lookup
const relMap = {};
EDGES.forEach(e => {
  if(!relMap[e.from]) relMap[e.from]=[];
  relMap[e.from].push({dir:'out',to:e.to,l:e.l,d:e.d,s:e.s});
  if(!relMap[e.to]) relMap[e.to]=[];
  relMap[e.to].push({dir:'in',from:e.from,l:e.l,d:e.d,s:e.s});
});

function initGraph(){
  const nodes = new vis.DataSet(NODES.map(n=>({
    id:n.id,label:n.l,group:n.g,
    color:{background:C[n.g]||'#888',border:'#fff',highlight:{background:'#fff',border:C[n.g]||'#888'}},
    font:{color:'#e0e0e0',strokeWidth:2,strokeColor:'#0f0f1a',size:11},
    borderWidth:1,
    size:n.g==='event'?18:(n.g==='project'?20:26),
    shape:n.g==='event'?'diamond':(n.g==='org'?'box':'ellipse'),
    mass:n.g==='org'?3:2,
  })));

  const edges = new vis.DataSet(EDGES.map(e=>({
    from:e.from,to:e.to,label:e.l,
    title: (e.d||'') + '\n\n📚 Sources:\n' + (e.s||['no source']).map((s,i)=>'['+(i+1)+'] '+s).join('\n'),
    color:{color:'#555',highlight:'#f7931a',hover:'#f7931a'},
    width:1.5,
    font:{size:9,color:'#888',strokeWidth:2,strokeColor:'#0f0f1a',align:'middle'},
    smooth:{type:'curvedCW',roundness:0.1},
    arrows:{to:{enabled:true,scaleFactor:0.6}},
  })));

  net = new vis.Network(document.getElementById('graph-container'),{nodes,edges},{
    physics:{solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-40,centralGravity:0.005,springLength:180,springConstant:0.02,damping:0.4},stabilization:{iterations:200}},
    layout:{improvedLayout:true},
    interaction:{hover:true,tooltipDelay:300,keyboard:true},
    edges:{smooth:{type:'curvedCW'}},
  });
  document.getElementById('loading').style.display='none';

  net.on('click',function(p){
    if(p.nodes.length>0) showNode(p.nodes[0]);
    else if(p.edges.length>0) showEdgeFromIds(p.edges[0]);
  });
}

function zoomIn(){if(net)net.moveScale(1.3)}
function zoomOut(){if(net)net.moveScale(0.7)}
function zoomFit(){if(net)net.fit()}
function resetView(){if(net){net.fit();net.moveTo({scale:1})}}

function showNode(id){
  const n = NODES.find(x=>x.id===id); if(!n)return;
  const d = DET[id]; const lbl = n.l.replace(/\n/g,' ');
  let h = `<h3>${lbl}</h3><div class="df"><div class="lbl">Type</div><div class="val">${n.g}</div></div>`;
  if(d){
    h+=`<div class="df"><div class="lbl">Role</div><div class="val">${d.role||n.d}</div></div>`;
    h+=`<div class="df"><div class="lbl">Description</div><div class="val">${n.d}</div></div>`;
    if(d.cur) h+=`<div class="df"><div class="lbl">Current Status</div><div class="val">${d.cur}</div></div>`;
    if(d.h) {h+=`<h4>Highlights</h4>`; d.h.forEach(x=>{h+=`<div style="font-size:12px;color:#ccc;margin:2px 0">• ${x}</div>`})}
  } else {
    h+=`<div class="df"><div class="lbl">Description</div><div class="val">${n.d}</div></div>`;
  }
  document.getElementById('tab-entity').innerHTML = h;

  const rels = relMap[id]||[];
  let rh = `<h3>🔗 Connections for ${lbl}</h3>`;
  if(rels.length===0) rh+=`<div class="empty-state">No connections</div>`;
  else rels.forEach(r=>{
    const target = r.dir==='out'?nmap[r.to]:nmap[r.from];
    const dirSym = r.dir==='out'?'→':'←';
    rh+=`<div class="rc"><div class="target">${dirSym} ${target}</div>`;
    rh+=`<div class="desc">${r.d||r.l||'related'}</div>`;
    rh+=`<span class="srclbl">📚 Sources:</span><div class="src">`;
    (r.s||[]).forEach((s,i)=>{rh+=`<a href="${s}" target="_blank">[${i+1}]</a> `});
    rh+=`</div></div>`;
  });
  document.getElementById('tab-relations').innerHTML = rh;

  if(d&&d.s){
    let sh = `<h3>📚 Sources — ${lbl}</h3>`;
    d.s.forEach((s,i)=>{sh+=`<div style="margin:4px 0;font-size:12px"><a href="${s}" target="_blank">[${i+1}] ${s}</a></div>`});
    document.getElementById('tab-sources').innerHTML = sh;
  } else document.getElementById('tab-sources').innerHTML = `<h3>📚 Sources</h3><div class="empty-state">No sources for this node</div>`;

  switchTab('entity');
}

function showEdgeFromIds(edgeId){
  // find the edge data
  const e = EDGES.find((x,i)=>i===edgeId || (x.from+'>'+x.to)===edgeId);
  if(!e) return;
  const fromName = nmap[e.from] || e.from;
  const toName = nmap[e.to] || e.to;
  let h = `<h3>🔗 ${fromName} → ${toName}</h3>`;
  h += `<div class="df"><div class="lbl">Relation Type</div><div class="val">${e.l||'unspecified'}</div></div>`;
  h += `<div class="df" style="margin-top:6px"><div class="lbl">Пояснение</div><div class="val">${e.d||'N/A'}</div></div>`;
  h += `<h4>📚 Sources (${(e.s||[]).length})</h4>`;
  (e.s||[]).forEach((s,i)=>{h+=`<div style="margin:4px 0;font-size:12px"><a href="${s}" target="_blank">[${i+1}] ${s}</a></div>`});
  document.getElementById('tab-entity').innerHTML = h;
  switchTab('entity');
}

function showTimeline(){
  let h = `<h3>📅 Timeline — Zcash</h3>`;
  TIMELINE.forEach(t=>{h+=`<div class="tl"><div class="yr">${t.y}</div><div class="ev">${t.e}</div></div>`});
  document.getElementById('tab-timeline').innerHTML = h;
}

function switchTab(t){
  document.querySelectorAll('.tabs button').forEach((b,i)=>{b.classList.toggle('active',['entity','relations','sources','timeline'][i]===t)});
  ['tab-entity','tab-relations','tab-sources','tab-timeline'].forEach(id=>{document.getElementById(id).classList.toggle('active',id==='tab-'+t)});
}
</script>
