var net=null, C={person:'#4a9eff',org:'#f7931a',project:'#7c3aed',investor:'#10b981',integration:'#ec4899',event:'#f59e0b'};
var nmap={};NN.forEach(function(n){nmap[n.id]=n.l;});
var relMap={};
EE.forEach(function(e){
  if(!relMap[e.f])relMap[e.f]=[];
  relMap[e.f].push({d:'out',to:e.t,l:e.l,ds:e.d,a:e.a});
  if(!relMap[e.t])relMap[e.t]=[];
  relMap[e.t].push({d:'in',from:e.f,l:e.l,ds:e.d,a:e.a});
});

function initGraph(){
  var nodes=new vis.DataSet(NN.map(function(n){
    return{id:n.id,label:n.l,group:n.g,
      color:{background:C[n.g]||'#888',border:'#fff',highlight:{background:'#fff',border:C[n.g]||'#888'}},
      font:{color:'#e0e0e0',strokeWidth:2,strokeColor:'#0f0f1a',size:11},
      borderWidth:1,size:n.g==='event'?18:(n.g==='project'?20:26),
      shape:n.g==='event'?'diamond':(n.g==='org'?'box':'ellipse'),mass:n.g==='org'?3:2};
  }));
  var edges=new vis.DataSet(EE.map(function(e,i){
    var desc=e.d||'N/A';
    var src=(e.a||['']).map(function(s,j){return'['+(j+1)+'] '+s;}).join('\n');
    return{id:i,from:e.f,to:e.t,label:e.l,
      title:'Description:\n'+desc+'\n\nSources:\n'+src,
      color:{color:'#555',highlight:'#f7931a',hover:'#f7931a'},
      width:1.5,font:{size:9,color:'#888',strokeWidth:2,strokeColor:'#0f0f1a',align:'middle'},
      smooth:{type:'curvedCW',roundness:0.1},arrows:{to:{enabled:true,scaleFactor:0.6}}};
  }));
  net=new vis.Network(document.getElementById('graph-canvas'),{nodes:nodes,edges:edges},{
    physics:{solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-40,centralGravity:0.005,springLength:180,springConstant:0.02,damping:0.4},stabilization:{iterations:200}},
    layout:{improvedLayout:true},interaction:{hover:true,tooltipDelay:300,keyboard:true},
    edges:{smooth:{type:'curvedCW'}},
  });
  var ld=document.getElementById('loading');if(ld)ld.style.display='none';
  net.on('click',function(p){
    if(p.nodes.length>0)showNode(p.nodes[0]);
    else if(p.edges.length>0){var eid=p.edges[0];if(EE[eid])showEdge(eid);}
  });
}

function zoomIn(){if(net)net.moveScale(1.3);}
function zoomOut(){if(net)net.moveScale(0.7);}
function zoomFit(){if(net)net.fit();}
function resetView(){if(net){net.fit();net.moveTo({scale:1});}}

function showNode(id){
  var n=NN.find(function(x){return x.id===id;});if(!n)return;
  var d=DT[id],lbl=n.l,g=n.g,de=n.d;
  var h='<h3>'+lbl+'</h3><div class="df"><div class="lbl">Type</div><div class="val">'+g+'</div></div>';
  if(d){
    h+='<div class="df"><div class="lbl">Role</div><div class="val">'+(d.r||de)+'</div></div>';
    h+='<div class="df"><div class="lbl">Description</div><div class="val">'+de+'</div></div>';
    if(d.c)h+='<div class="df"><div class="lbl">Current Status</div><div class="val">'+d.c+'</div></div>';
    if(d.h){h+='<h4>Key highlights</h4>';d.h.forEach(function(x){h+='<div style="font-size:12px;color:#ccc;margin:2px 0">* '+x+'</div>';});}
  }else h+='<div class="df"><div class="lbl">Description</div><div class="val">'+de+'</div></div>';
  document.getElementById('tab-entity').innerHTML=h;

  var rels=relMap[id]||[];
  var rh='<h3>Connections for '+lbl+'</h3>';
  if(rels.length===0)rh+='<div class="empty-state">No connections</div>';
  else rels.forEach(function(r){
    var tgt=r.d==='out'?nmap[r.to]:nmap[r.from];
    var sym=r.d==='out'?'->':'<-';
    rh+='<div class="rc"><div class="target">'+sym+' '+tgt+'</div>';
    rh+='<div class="desc">'+(r.ds||r.l||'related')+'</div>';
    rh+='<span class="srclbl">Sources ('+((r.a||[]).length)+'):</span><div class="src">';
    (r.a||[]).forEach(function(s,i){rh+='<a href="'+s+'" target="_blank">['+(i+1)+']</a> ';});
    rh+='</div></div>';
  });
  document.getElementById('tab-relations').innerHTML=rh;

  if(d&&d.s){
    var sh='<h3>Sources - '+lbl+'</h3>';
    d.s.forEach(function(s,i){sh+='<div style="margin:4px 0;font-size:12px"><a href="'+s+'" target="_blank">['+(i+1)+'] '+s+'</a></div>';});
    document.getElementById('tab-sources').innerHTML=sh;
  }else document.getElementById('tab-sources').innerHTML='<h3>Sources</h3><div class="empty-state">No additional sources</div>';
  switchTab('entity');
}

function showEdge(idx){
  var e=EE[idx];if(!e)return;
  var fn=nmap[e.f]||e.f,tn=nmap[e.t]||e.t;
  var h='<h3>'+fn+' -> '+tn+'</h3>';
  h+='<div class="df"><div class="lbl">Relation Type</div><div class="val">'+(e.l||'unspecified')+'</div></div>';
  h+='<div class="df" style="margin-top:6px"><div class="lbl">Description</div><div class="val">'+(e.d||'N/A')+'</div></div>';
  h+='<h4>Sources ('+((e.a||[]).length)+')</h4>';
  (e.a||[]).forEach(function(s,i){h+='<div style="margin:4px 0;font-size:12px"><a href="'+s+'" target="_blank">['+(i+1)+'] '+s+'</a></div>';});
  document.getElementById('tab-entity').innerHTML=h;
  switchTab('entity');
}

function showTimeline(){
  var h='<h3>Timeline - Zcash</h3>';
  TL.forEach(function(t){h+='<div class="tl"><div class="yr">'+t.y+'</div><div class="ev">'+t.e+'</div></div>';});
  document.getElementById('tab-timeline').innerHTML=h;
}

function switchTab(t){
  var tabs=['entity','relations','sources','timeline'];
  document.querySelectorAll('.tabs button').forEach(function(b,i){b.classList.toggle('active',tabs[i]===t);});
  tabs.forEach(function(tab){var el=document.getElementById('tab-'+tab);if(el)el.classList.toggle('active',tab===t);});
}
