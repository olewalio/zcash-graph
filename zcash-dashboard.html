// ===== GRAPH SETUP =====
let network = null;

function getNodeColor(group) {
  const colors = { person: '#4a9eff', org: '#f7931a', project: '#7c3aed', investor: '#10b981', integration: '#ec4899', event: '#f59e0b' };
  return colors[group] || '#888';
}

function initGraph() {
  const nodes = new vis.DataSet(nodesData.map(n => ({
    id: n.id,
    label: n.label,
    group: n.group,
    title: n.title,
    color: { background: getNodeColor(n.group), border: '#fff', highlight: { background: '#fff', border: getNodeColor(n.group) } },
    font: { color: '#e0e0e0', strokeWidth: 2, strokeColor: '#0f0f1a', size: 11 },
    borderWidth: 1,
    size: n.group === 'event' ? 20 : (n.group === 'project' ? 22 : 28),
    shape: n.group === 'event' ? 'diamond' : (n.group === 'org' ? 'box' : 'ellipse'),
    mass: n.group === 'org' ? 3 : 2,
  })));

  const edges = new vis.DataSet(edgesData.map(e => ({
    from: e.from,
    to: e.to,
    label: e.label || '',
    color: { color: e.color || '#555', highlight: '#f7931a', hover: '#f7931a' },
    width: 1.5,
    font: { size: 9, color: '#888', strokeWidth: 2, strokeColor: '#0f0f1a', align: 'middle' },
    dashes: e.dashes || false,
    smooth: { type: 'curvedCW', roundness: 0.1 },
    arrows: { to: { enabled: true, scaleFactor: 0.6 } },
  })));

  const container = document.getElementById('graph-container');
  const data = { nodes, edges };
  const options = {
    physics: {
      solver: 'forceAtlas2Based',
      forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.005, springLength: 180, springConstant: 0.02, damping: 0.4 },
      stabilization: { iterations: 200 },
    },
    layout: { improvedLayout: true },
    interaction: {
      hover: true,
      tooltipDelay: 200,
      navigationButtons: false,
      keyboard: true,
    },
    edges: { smooth: { type: 'curvedCW' } },
  };

  network = new vis.Network(container, data, options);

  document.getElementById('loading').style.display = 'none';

  network.on('click', function(params) {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      showNodeDetails(nodeId);
    }
  });

  // Show timeline on load
  showTimeline();
}

function zoomIn() { if (network) network.moveScale(1.3); }
function zoomOut() { if (network) network.moveScale(0.7); }
function fitView() { if (network) network.fit(); }

function switchTab(tab, btn) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function showNodeDetails(nodeId) {
  const d = details[nodeId];
  const node = nodesData.find(n => n.id === nodeId);
  if (!node) return;

  // Details tab
  let html = '';
  if (d) {
    html += `<h3>${node.label.replace(/\n/g, ' ')}</h3>`;
    html += `<div class="field"><div class="label">Role</div><div class="value">${d.role || node.title}</div></div>`;
    html += `<div class="field" style="margin-top:10px"><div class="value">${d.description}</div></div>`;
    if (d.current) {
      html += `<div class="field" style="margin-top:8px"><div class="label">Current</div><div class="value">${d.current}</div></div>`;
    }
    if (d.highlights) {
      html += `<div class="field" style="margin-top:8px"><div class="label">Highlights</div></div>`;
      d.highlights.forEach(h => { html += `<div style="font-size:13px;color:#ccc;margin:2px 0">• ${h}</div>`; });
    }
  } else {
    html += `<h3>${node.label.replace(/\n/g, ' ')}</h3>`;
    html += `<div class="field"><div class="label">Type</div><div class="value">${node.group}</div></div>`;
    html += `<div class="field"><div class="label">${node.title}</div></div>`;
  }
  document.getElementById('tab-details').innerHTML = html;

  // Sources tab
  if (d && d.sources) {
    let srcHtml = `<h3>Sources</h3>`;
    d.sources.forEach(s => { srcHtml += `<div style="margin:4px 0;font-size:13px">• ${s}</div>`; });
    document.getElementById('tab-sources').innerHTML = srcHtml;
  } else {
    document.getElementById('tab-sources').innerHTML = `<h3>Sources</h3><div class="empty-state">No sources available for this node</div>`;
  }

  // Switch to details tab
  document.querySelectorAll('.tabs button')[0].click();
}

function showTimeline() {
  let html = `<h3>📅 Zcash Timeline</h3>`;
  timelineData.forEach(t => {
    html += `<div class="timeline-item"><div class="year">${t.year}</div><div class="event">${t.event}</div></div>`;
  });
  document.getElementById('tab-timeline').innerHTML = html;
}
